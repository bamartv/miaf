<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Movies & Series - Prova</title>
<style>
body{font-family:Arial,sans-serif;background:#141414;color:#fff;margin:0;padding:20px;}
h1{text-align:center;margin-bottom:20px;}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:12px;}
.card{position:relative;cursor:pointer;transition: transform 0.2s;border-radius:12px;overflow:hidden;border:2px solid #444;background:#1f1f1f;}
.card:hover{transform:scale(1.05);border-color:#e50914;background:#2a2a2a;}
.poster{width:100%;display:block;}
.badge{position:absolute;top:8px;right:8px;background:#e50914;color:#fff;padding:4px 6px;font-size:14px;font-weight:bold;border-radius:8px;}
.favorite-btn{font-size:20px;color:#fff;text-shadow:0 0 4px #000;}
.favorite-btn.active{color:gold;}
#infoCard{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(34,34,34,0.95);display:none;z-index:1001;backdrop-filter:blur(8px);color:#fff;padding:20px;overflow:auto;display:flex;align-items:center;justify-content:center;}
#infoContent{position:relative;background:#222;border-radius:10px;padding:20px;max-width:800px;width:90%;}
#infoContent h2{margin-top:0;color:#e50914;display:inline-block;}
#infoContent button{margin-left:10px;padding:8px 12px;background:#e50914;border:none;color:#fff;border-radius:5px;cursor:pointer;vertical-align:middle;}
#trailerFrame{width:100%;height:360px;margin-top:10px;display:none;}
</style>
</head>
<body>
<h1>Movies & Series - Prova</h1>
<div class='grid' id='moviesGrid'></div>

<div id='infoCard'>
  <div id='infoContent'>
    <h2 id="infoTitle"></h2>
    <div style="margin:10px 0;">
      <button id="closeCardBtn">Chiudi</button>
      <span id="favoriteInCard" class="favorite-btn">★</span>
    </div>
    <p id="infoGenres"></p>
    <p id="infoVote"></p>
    <p id="infoOverview"></p>
    <p id="infoYear"></p>
    <p id="infoDuration"></p>
    <p id="infoCast"></p>
    <iframe id="trailerFrame" allow="autoplay; encrypted-media" allowfullscreen></iframe>
  </div>
</div>

<script>
// Film di prova
const allData = [
  {id:"1", title:"Inception", poster:"https://image.tmdb.org/t/p/w300/qmDpIHrmpJINaRKAfWQfftjCdyi.jpg", genres:["Azione","Fantascienza"], vote:8.8, overview:"Un ladro che ruba segreti dai sogni...", year:"2010", duration:148, cast:["Leonardo DiCaprio","Joseph Gordon-Levitt"], trailer:"8hP9D6kZseM", type:"movie"},
  {id:"2", title:"The Matrix", poster:"https://image.tmdb.org/t/p/w300/f89U3ADr1oiB1s9GkdPOEpXUk5H.jpg", genres:["Azione","Fantascienza"], vote:8.7, overview:"Un hacker scopre la verità sulla realtà...", year:"1999", duration:136, cast:["Keanu Reeves","Laurence Fishburne"], trailer:"vKQi3bBA1y8", type:"movie"},
  {id:"3", title:"Interstellar", poster:"https://image.tmdb.org/t/p/w300/rAiYTfKGqDCRIIqo664sY9XZIvQ.jpg", genres:["Avventura","Fantascienza"], vote:8.6, overview:"Un gruppo di astronauti viaggia attraverso un wormhole...", year:"2014", duration:169, cast:["Matthew McConaughey","Anne Hathaway"], trailer:"zSWdZVtXT7E", type:"movie"},
  {id:"4", title:"The Dark Knight", poster:"https://image.tmdb.org/t/p/w300/qJ2tW6WMUDux911r6m7haRef0WH.jpg", genres:["Azione","Crime"], vote:9.0, overview:"Batman affronta il Joker...", year:"2008", duration:152, cast:["Christian Bale","Heath Ledger"], trailer:"EXeTwQWrcwY", type:"movie"},
  {id:"5", title:"Avatar", poster:"https://image.tmdb.org/t/p/w300/kmcqlZGaSh20zpTbuoF0Cdn07dT.jpg", genres:["Avventura","Fantascienza"], vote:7.8, overview:"Su Pandora, gli umani cercano risorse...", year:"2009", duration:162, cast:["Sam Worthington","Zoe Saldana"], trailer:"5PSNL1qE6VY", type:"movie"}
];

let favorites = [];
let currentItem = null;

const grid=document.getElementById('moviesGrid');
const infoCard=document.getElementById('infoCard');
const closeCardBtn=document.getElementById('closeCardBtn');
const infoTitle=document.getElementById('infoTitle');
const infoGenres=document.getElementById('infoGenres');
const infoVote=document.getElementById('infoVote');
const infoOverview=document.getElementById('infoOverview');
const infoYear=document.getElementById('infoYear');
const infoDuration=document.getElementById('infoDuration');
const infoCast=document.getElementById('infoCast');
const favoriteInCard=document.getElementById('favoriteInCard');
const trailerFrame=document.getElementById('trailerFrame');

function toggleFavorite(id){
  if(favorites.includes(id)) favorites = favorites.filter(f=>f!==id);
  else favorites.push(id);
  favoriteInCard.classList.toggle("active", favorites.includes(id));
}

function openInfo(item){
  currentItem = item;
  infoCard.style.display='flex';
  infoTitle.textContent = item.title;
  infoGenres.textContent = "Generi: "+item.genres.join(", ");
  infoVote.textContent = "★ "+item.vote;
  infoOverview.textContent = item.overview;
  infoYear.textContent = "Anno: "+item.year;
  infoDuration.textContent = "Durata: "+item.duration+" min";
  infoCast.textContent = "Cast: "+item.cast.join(", ");
  favoriteInCard.classList.toggle("active", favorites.includes(item.id));
  favoriteInCard.onclick = () => toggleFavorite(item.id);

  if(item.trailer){
    trailerFrame.src = "https://www.youtube.com/embed/"+item.trailer+"?autoplay=0";
    trailerFrame.style.display="block";
  } else {
    trailerFrame.style.display="none";
  }
}

closeCardBtn.onclick = () => { infoCard.style.display='none'; trailerFrame.src=""; };

function renderGrid(){
  grid.innerHTML='';
  allData.forEach(item=>{
    const card = document.createElement('div');
    card.className='card';
    card.innerHTML = `
      <img class='poster' src='${item.poster}' alt='${item.title}'>
      <div class='badge'>${item.vote}</div>
    `;
    card.onclick = () => openInfo(item);
    grid.appendChild(card);
  });
}

renderGrid();
</script>
</body>
</html>
