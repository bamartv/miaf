<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>TV Home Demo</title>
<style>
body{
  margin:0;
  background:#000;
  color:#fff;
  font-family: Arial, sans-serif;
  overflow:hidden;
}

.hero{
  height:50vh;
  background:linear-gradient(to right,rgba(0,0,0,.8),rgba(0,0,0,.2)),
             url("https://image.tmdb.org/t/p/original/8UlWHLMpgZm9bx6QYh0NFoq67TZ.jpg");
  background-size:cover;
  padding:40px;
  display:flex;
  flex-direction:column;
  justify-content:flex-end;
}

.hero h1{font-size:48px;margin:0;}
.hero p{max-width:600px;color:#ccc;}

.hero .buttons button{
  font-size:18px;
  padding:10px 20px;
  margin-right:10px;
  border:none;
  border-radius:6px;
  cursor:pointer;
}

.play{background:#fff;color:#000;}
.info{background:#333;color:#fff;}

.section{
  margin-top:20px;
  padding-left:40px;
}

.section h2{margin-bottom:10px;}

.row{
  display:flex;
  gap:15px;
  overflow-x:auto;
  padding-bottom:10px;
}

.card{
  min-width:180px;
  height:270px;
  background:#222;
  border-radius:10px;
  overflow:hidden;
  position:relative;
}

.card img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.card span{
  position:absolute;
  bottom:6px;
  left:6px;
  background:#000;
  padding:4px 6px;
  font-size:12px;
  border-radius:4px;
}
</style>
</head>

<body>

<div class="hero">
  <h1>Interstellar</h1>
  <p>Un viaggio oltre lo spazio e il tempo per salvare l’umanità.</p>
  <div class="buttons">
    <button class="play">▶ Guarda</button>
    <button class="info">ℹ Info</button>
  </div>
</div>

<div class="section">
  <h2>Ultimi aggiunti</h2>
  <div class="row">
    <div class="card"><img src="https://image.tmdb.org/t/p/w300/8UlWHLMpgZm9bx6QYh0NFoq67TZ.jpg"><span>PEGI 12</span></div>
    <div class="card"><img src="https://image.tmdb.org/t/p/w300/qJ2tW6WMUDux911r6m7haRef0WH.jpg"><span>PEGI 16</span></div>
    <div class="card"><img src="https://image.tmdb.org/t/p/w300/9cqNxx0GxF0bflZmeSMuL5tnGzr.jpg"><span>PEGI 13</span></div>
    <div class="card"><img src="https://image.tmdb.org/t/p/w300/74xTEgt7R36Fpooo50r9T25onhq.jpg"><span>PEGI 18</span></div>
    <div class="card"><img src="https://image.tmdb.org/t/p/w300/lNyLSOKMMeUPr1RsL4KcRuIXwHt.jpg"><span>PEGI 7</span></div>
  </div>
</div>

<div class="section">
  <h2>Film consigliati</h2>
  <div class="row">
    <div class="card"><img src="https://image.tmdb.org/t/p/w300/6FfCtAuVAW8XJjZ7eWeLibRLWTw.jpg"><span>PEGI 12</span></div>
    <div class="card"><img src="https://image.tmdb.org/t/p/w300/saHP97rTPS5eLmrLQEcANmKrsFl.jpg"><span>PEGI 16</span></div>
    <div class="card"><img src="https://image.tmdb.org/t/p/w300/w2PMyoyLU22YvrGK3smVM9fW1jj.jpg"><span>PEGI 12</span></div>
    <div class="card"><img src="https://image.tmdb.org/t/p/w300/kOVEVeg59E0wsnXmF9nrh6OmWII.jpg"><span>PEGI 18</span></div>
    <div class="card"><img src="https://image.tmdb.org/t/p/w300/xBHvZcjRiWyobQ9kxBhO6B2dtRI.jpg"><span>PEGI 7</span></div>
  </div>
</div>

</body>
</html>
