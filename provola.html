<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Film Info Demo</title>
<style>
body {
  margin:0;
  font-family: Arial, sans-serif;
  background:#141414;
  color:#fff;
}
#infoCard {
  position:fixed;
  top:0; left:0; width:100%; height:100%;
  background: rgba(0,0,0,0.7);
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:flex-start;
  overflow:auto;
  padding:20px;
  backdrop-filter: blur(6px);
}
#infoContent {
  position: relative;
  width:90%;
  max-width:900px;
  background: rgba(0,0,0,0.6);
  border-radius:12px;
  padding:20px;
  margin-top:40px;
  display:flex;
  flex-direction:column;
  align-items:center;
  background-size: cover;
  background-position: center;
}
#infoTitle {
  font-size:28px;
  color:#e50914;
  margin-bottom:10px;
}
#infoDetails p {
  margin:5px 0;
}
#playerContainer {
  width:80%;
  max-width:720px;
  height:360px;
  margin:15px 0;
}
#playerContainer iframe {
  width:100%;
  height:100%;
  border:none;
  border-radius:8px;
}
.action-buttons {
  display:flex;
  gap:15px;
  margin:10px 0;
}
#watchBtn {
  background:#e50914;
  color:#fff;
  border:none;
  border-radius:8px;
  padding:10px 16px;
  cursor:pointer;
  font-weight:bold;
  font-size:16px;
}
#favoriteBtn {
  background: gold;
  color: black;
  font-weight: bold;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  padding: 10px 16px;
  font-size:16px;
  transition: transform 0.2s;
}
#favoriteBtn.active {
  transform: scale(1.1);
  box-shadow: 0 0 10px gold;
}
#favoriteBtn:hover {
  opacity: 0.9;
}
#related {
  display:flex;
  overflow-x:auto;
  gap:10px;
  margin-top:15px;
  padding-bottom:10px;
}
#related::-webkit-scrollbar { display:none; }
.related-card {
  flex-shrink:0;
  width:120px;
  cursor:pointer;
}
.related-card img {
  width:100%;
  border-radius:8px;
  display:block;
}
</style>
</head>
<body>

<div id="infoCard">
  <div id="infoContent" style="background-image:url('https://image.tmdb.org/t/p/w500/qJ2tW6WMUDux911r6m7haRef0WH.jpg');">
    <h2 id="infoTitle">The Dark Knight</h2>
    <div id="infoDetails">
      <p>Anno: 2008</p>
      <p>Durata: 152 min</p>
      <p>Generi: Azione, Crimine, Drammatico</p>
      <p>Cast: Christian Bale, Heath Ledger, Aaron Eckhart</p>
      <p>Trama: Batman si scontra con il Joker, un criminale psicopatico che vuole creare caos a Gotham City.</p>
    </div>
    <div class="action-buttons">
      <button id="watchBtn" onclick="watchMovie()">Guarda</button>
      <button id="favoriteBtn" onclick="toggleFavorite()">★ Preferiti</button>
    </div>
    <div id="playerContainer">
      <iframe src="https://www.youtube.com/embed/EXeTwQWrcwY" allowfullscreen></iframe>
    </div>
    <h3>Film correlati</h3>
    <div id="related">
      <div class="related-card"><img src="https://image.tmdb.org/t/p/w500/rAGiXaUfPzY7CDEyNKUofk3Kw2e.jpg" alt="Inception"></div>
      <div class="related-card"><img src="https://image.tmdb.org/t/p/w500/9gk7adHYeDvHkCSEqAvQNLV5Uge.jpg" alt="Interstellar"></div>
      <div class="related-card"><img src="https://image.tmdb.org/t/p/w500/5pMy5LF2JAleBNBtuzizfCMWM7k.jpg" alt="Joker"></div>
      <div class="related-card"><img src="https://image.tmdb.org/t/p/w500/hqkIcbrOHL86UncnHIsHVcVmzue.jpg" alt="Batman Begins"></div>
      <div class="related-card"><img src="https://image.tmdb.org/t/p/w500/6O0xpr1p6hD9Nk0RR4Z2V6fV6iA.jpg" alt="The Prestige"></div>
      <div class="related-card"><img src="https://image.tmdb.org/t/p/w500/8hP9D40gD4PSK4h7t1kGkWbCgZT.jpg" alt="Memento"></div>
      <div class="related-card"><img src="https://image.tmdb.org/t/p/w500/8jQFzQGzJ5rI3v09Usk7NpWZC2p.jpg" alt="Dunkirk"></div>
      <div class="related-card"><img src="https://image.tmdb.org/t/p/w500/jTswp6KyDYKtvC52GbHagrZbGvD.jpg" alt="The Dark Knight Rises"></div>
      <div class="related-card"><img src="https://image.tmdb.org/t/p/w500/9Gtg2DzBhmYamXBS1hKAhiwbBKS.jpg" alt="Justice League"></div>
      <div class="related-card"><img src="https://image.tmdb.org/t/p/w500/7RyHsO4yDXtBv1zUU3mTpHeQ0d5.jpg" alt="Avengers: Endgame"></div>
    </div>
  </div>
</div>

<script>
let favoriteState = false;
function toggleFavorite(){
  favoriteState = !favoriteState;
  document.getElementById('favoriteBtn').classList.toggle("active", favoriteState);
}
function watchMovie(){
  alert("Riproduzione film!");
}
</script>

</body>
</html>
