<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Film Detail Demo</title>
<style>
body {
    margin:0;
    font-family: Arial, sans-serif;
    background:#000;
    color:#fff;
}
#infoCard {
    position: relative;
    width: 100%;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: flex-end;
    padding: 20px;
    box-sizing: border-box;
    background:
        linear-gradient(to bottom, rgba(0,0,0,0) 35%, rgba(0,0,0,1) 50%, rgba(0,0,0,1) 100%),
        url('https://image.tmdb.org/t/p/original/mtwO9ZBk2iW8V3SdO9gSxZk1y0O.jpg') center/cover no-repeat;
    background-size: cover;
}
#infoText {
    margin-top: 40vh;
    background: rgba(0,0,0,0);
}
h1 {
    margin-top: 0;
    color: #e50914;
}
p {
    margin:5px 0;
}
#buttons {
    display: flex;
    gap: 10px;
    margin: 10px 0 20px;
}
.button {
    padding: 10px 16px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
    font-size: 16px;
}
#playBtn { background: #e50914; color: #fff; }
#favoriteBtn { background: gold; color: #000; }
#closeBtn { background: #555; color: #fff; }
#trailer {
    width: 100%;
    max-width: 500px;
    height: 280px;
    border: none;
    border-radius: 8px;
    margin-bottom: 20px;
}
#related {
    display: flex;
    overflow-x: auto;
    gap: 10px;
    padding-bottom: 10px;
}
#related::-webkit-scrollbar { display: none; }
.related-item {
    flex: 0 0 auto;
    width: 120px;
    border-radius: 6px;
}
.related-item img {
    width: 100%;
    border-radius: 6px;
}
</style>
</head>
<body>

<div id="infoCard">
    <div id="infoText">
        <h1>Luca</h1>
        <div id="buttons">
            <button id="playBtn" class="button">Guarda</button>
            <button id="favoriteBtn" class="button">★ Preferiti</button>
            <button id="closeBtn" class="button">Chiudi</button>
        </div>
        <p><strong>Anno:</strong> 2021</p>
        <p><strong>Durata:</strong> 95 min</p>
        <p><strong>Genere:</strong> Animazione, Avventura, Famiglia</p>
        <p><strong>Cast:</strong> Jacob Tremblay, Jack Dylan Grazer, Emma Berman</p>
        <p><strong>Descrizione:</strong> Luca vive un’estate indimenticabile sulla splendida Riviera italiana, ma nasconde un segreto: è un mostro marino di un altro mondo.</p>

        <iframe id="trailer" src="https://www.youtube.com/embed/3lfn1NohI6c?autoplay=1&mute=1" allowfullscreen></iframe>

        <h2>Film correlati</h2>
        <div id="related">
            <div class="related-item"><img src="https://image.tmdb.org/t/p/w500/uW0FWp0Eh6H3jATlXv3UQmChwfn.jpg" alt="Film 1"></div>
            <div class="related-item"><img src="https://image.tmdb.org/t/p/w500/kz4s9N7xq1sz6Z0G1F5T7xMZ8pT.jpg" alt="Film 2"></div>
            <div class="related-item"><img src="https://image.tmdb.org/t/p/w500/4q2hz2m8hubgvijz8Ez0T2Os2Yv.jpg" alt="Film 3"></div>
            <div class="related-item"><img src="https://image.tmdb.org/t/p/w500/uxzzxijgPIY7slzFvMotPv8wjKA.jpg" alt="Film 4"></div>
            <div class="related-item"><img src="https://image.tmdb.org/t/p/w500/9I4cG2EDVXuZpKQLN8tBrXC6lqZ.jpg" alt="Film 5"></div>
            <div class="related-item"><img src="https://image.tmdb.org/t/p/w500/7WsyChQLEftFiDOVTGkv3hFpyyt.jpg" alt="Film 6"></div>
            <div class="related-item"><img src="https://image.tmdb.org/t/p/w500/2X7m8I9O4rJqXHJzTovWqFhX5Lc.jpg" alt="Film 7"></div>
            <div class="related-item"><img src="https://image.tmdb.org/t/p/w500/5WJt6k5j9fYBuhSvn2th6CEhWhf.jpg" alt="Film 8"></div>
            <div class="related-item"><img src="https://image.tmdb.org/t/p/w500/3bOGNsHlrswhyW79uvIHH1V43JI.jpg" alt="Film 9"></div>
            <div class="related-item"><img src="https://image.tmdb.org/t/p/w500/lqN5qPn0DR3jNDeK6sIz34p9XH2.jpg" alt="Film 10"></div>
        </div>
    </div>
</div>

</body>
</html>
