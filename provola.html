<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Film & Serie - Index</title>
<style>
body { font-family: Arial, sans-serif; background:#141414; color:#fff; margin:0; padding:20px; }
h1 { text-align:center; margin-bottom:20px; color:#e50914; }
.grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(160px,1fr)); gap:15px; }
.card { position:relative; border-radius:12px; overflow:hidden; background:#1f1f1f; border:2px solid #444; transition:transform .2s; }
.card:hover { transform:scale(1.05); border-color:#e50914; }
.poster { width:100%; display:block; }
.badge { position:absolute; top:8px; right:8px; background:#e50914; padding:4px 6px; border-radius:6px; font-weight:bold; }
</style>
</head>
<body>
<h1>Film & Serie</h1>
<div class="grid">
  <a href="detail.html?id=1&type=movie" class="card">
    <img src="https://via.placeholder.com/300x450?text=Film+A" class="poster" alt="Film A">
    <div class="badge">7.5</div>
  </a>
  <a href="detail.html?id=2&type=movie" class="card">
    <img src="https://via.placeholder.com/300x450?text=Film+B" class="poster" alt="Film B">
    <div class="badge">8.1</div>
  </a>
  <a href="detail.html?id=3&type=tv" class="card">
    <img src="https://via.placeholder.com/300x450?text=Serie+C" class="poster" alt="Serie C">
    <div class="badge">7.8</div>
  </a>
  <a href="detail.html?id=4&type=movie" class="card">
    <img src="https://via.placeholder.com/300x450?text=Film+D" class="poster" alt="Film D">
    <div class="badge">8.0</div>
  </a>
</div>
</body>
</html>
