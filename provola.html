<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<title>TV Home Premium</title>

<style>
body{
  margin:0;
  font-family: Arial, sans-serif;
  color:#fff;
  background: linear-gradient(180deg, #1e3c72 0%, #2a5298 45%, #0f2027 100%);
}

/* ===== TOP BAR ===== */
.topbar{
  position:sticky;
  top:0;
  z-index:100;
  display:flex;
  gap:12px;
  align-items:center;
  padding:12px 20px;
  background: rgba(10,20,40,.9);
  backdrop-filter: blur(8px);
}

.topbar input,
.topbar select,
.topbar button{
  font-size:16px;
  padding:8px 14px;
  border-radius:10px;
  border:none;
  background:#243b6b;
  color:#fff;
}

.topbar button{
  cursor:pointer;
}

.topbar button:hover{
  background:#3b82f6;
}

/* ===== HERO ===== */
.hero{
  height:45vh;
  background:
    linear-gradient(to right, rgba(10,20,40,.9), rgba(10,20,40,.3)),
    url("https://image.tmdb.org/t/p/original/8UlWHLMpgZm9bx6QYh0NFoq67TZ.jpg");
  background-size:cover;
  padding:40px;
  display:flex;
  flex-direction:column;
  justify-content:flex-end;
}

/* ===== SEZIONI ===== */
.section{
  padding-left:40px;
  margin-top:25px;
}

.section h2{
  margin-bottom:10px;
}

/* ===== ROW ===== */
.row{
  display:flex;
  gap:16px;
  overflow-x:auto;
  padding-bottom:14px;
}

/* ===== CARD ===== */
.card{
  min-width:180px;
  height:270px;
  border-radius:14px;
  overflow:hidden;
  background:#111;
  box-shadow: 0 8px 20px rgba(0,0,0,.4);
  transition: transform .2s;
}

.card:hover{
  transform: scale(1.08);
}

.card img{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* ===== BADGE ===== */
.badge{
  position:absolute;
  bottom:8px;
  left:8px;
  background:rgba(0,0,0,.75);
  padding:4px 8px;
  border-radius:6px;
  font-size:12px;
}
</style>
</head>

<body>

<!-- ===== TOP BAR ===== -->
<div class="topbar">
  🔍 <input type="text" placeholder="Cerca titolo...">
  
  🎭
  <select>
    <option>Tutti i generi</option>
    <option>Azione</option>
    <option>Commedia</option>
    <option>Dramma</option>
    <option>Famiglia</option>
    <option>Fantascienza</option>
  </select>

  <button>⭐ Preferiti</button>
  <button>🕘 Visti di recente</button>
  <button>🎲 Random</button>
</div>

<!-- ===== HERO ===== -->
<div class="hero">
  <h1>Interstellar</h1>
  <p>Un viaggio oltre i confini dello spazio e del tempo.</p>
</div>

<!-- ===== ULTIMI AGGIUNTI ===== -->
<div class="section">
  <h2>Ultimi aggiunti</h2>
  <div class="row">
    <div class="card"><img src="https://image.tmdb.org/t/p/w300/74xTEgt7R36Fpooo50r9T25onhq.jpg"></div>
    <div class="card"><img src="https://image.tmdb.org/t/p/w300/qJ2tW6WMUDux911r6m7haRef0WH.jpg"></div>
    <div class="card"><img src="https://image.tmdb.org/t/p/w300/lNyLSOKMMeUPr1RsL4KcRuIXwHt.jpg"></div>
    <div class="card"><img src="https://image.tmdb.org/t/p/w300/9cqNxx0GxF0bflZmeSMuL5tnGzr.jpg"></div>
  </div>
</div>

<!-- ===== CONSIGLIATI ===== -->
<div class="section">
  <h2>Consigliati per te</h2>
  <div class="row">
    <div class="card"><img src="https://image.tmdb.org/t/p/w300/xBHvZcjRiWyobQ9kxBhO6B2dtRI.jpg"></div>
    <div class="card"><img src="https://image.tmdb.org/t/p/w300/kOVEVeg59E0wsnXmF9nrh6OmWII.jpg"></div>
    <div class="card"><img src="https://image.tmdb.org/t/p/w300/6FfCtAuVAW8XJjZ7eWeLibRLWTw.jpg"></div>
  </div>
</div>

</body>
</html>
