<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Film Demo</title>
<style>
body {
    margin:0; padding:0;
    font-family: Arial, sans-serif;
    background: #141414;
    color: #fff;
}
#infoCard {
    position: fixed;
    top:0; left:0; width:100%; height:100%;
    display:flex; flex-direction:column; align-items:center; justify-content:center;
    background-size: cover; background-position: center;
    background-repeat: no-repeat;
    backdrop-filter: brightness(0.4);
    overflow-y:auto;
    padding: 20px;
}
#infoContent {
    width: 90%; max-width: 900px;
    display:flex; flex-direction:column; align-items:center;
    gap: 15px;
    text-align:center;
    background: rgba(0,0,0,0.6); /* leggero overlay per leggibilità */
    padding: 15px 20px;
    border-radius: 12px;
}
#infoContent h2 { margin:0; font-size:28px; color:#e50914; }
#infoContent p { margin:3px 0; font-size:14px; }
#player { width:80%; height:300px; border:none; border-radius:8px; }
#buttons { display:flex; gap:15px; margin-top:10px; }
button { padding:10px 20px; font-size:14px; border:none; border-radius:6px; cursor:pointer; }
button#watchBtn { background:#e50914; color:#fff; }
button#favBtn { background: gold; color:#000; }
#related { display:flex; overflow-x:auto; gap:10px; margin-top:20px; padding-bottom:10px; }
#related::-webkit-scrollbar { display:none; }
#related img { width:100px; border-radius:8px; flex-shrink:0; cursor:pointer; transition: transform 0.2s; }
#related img:hover { transform: scale(1.05); }
</style>
</head>
<body>

<div id="infoCard">
  <div id="infoContent">
    <h2 id="title">Il Signore degli Anelli</h2>
    <p id="genres">Generi: Fantasy, Avventura</p>
    <p id="year">Anno: 2001</p>
    <p id="duration">Durata: 178 min</p>
    <p id="cast">Cast: Elijah Wood, Ian McKellen, Viggo Mortensen</p>
    
    <iframe id="player" src="https://www.youtube.com/embed/V75dMMIW2B4" allowfullscreen></iframe>
    
    <div id="buttons">
      <button id="watchBtn">Guarda</button>
      <button id="favBtn">★ Preferiti</button>
    </div>

    <div id="related">
      <img src="https://image.tmdb.org/t/p/w200/6oom5QYQ2yQTMJIbnvbkBL9cHo6.jpg" alt="Il Signore degli Anelli: La Compagnia dell'Anello">
      <img src="https://image.tmdb.org/t/p/w200/7W0GbfvXJ7H8qR6hFf7rF3tyPzA.jpg" alt="Il Signore degli Anelli: Le Due Torri">
      <img src="https://image.tmdb.org/t/p/w200/rCzpDGLbOoPwLjy3OAm5NUPOTrC.jpg" alt="Il Signore degli Anelli: Il Ritorno del Re">
      <img src="https://image.tmdb.org/t/p/w200/9DeGfFIqjph5CBFVQrD6wv9S7rF.jpg" alt="Lo Hobbit: Un Viaggio Inaspettato">
      <img src="https://image.tmdb.org/t/p/w200/6s1G9pHYpo4iR5Xj9SS1ZfXZ1Wn.jpg" alt="Lo Hobbit: La Desolazione di Smaug">
      <img src="https://image.tmdb.org/t/p/w200/56zTpe2xvaA4alU51sRWPoKPYZy.jpg" alt="Lo Hobbit: La Battaglia delle Cinque Armate">
      <img src="https://image.tmdb.org/t/p/w200/9f6W7a3S2Ew3KX4gkYdWcAq1T0O.jpg" alt="Harry Potter e la Pietra Filosofale">
      <img src="https://image.tmdb.org/t/p/w200/dCtFvscYcXQKTNvyyaQr2g2UacJ.jpg" alt="Harry Potter e la Camera dei Segreti">
      <img src="https://image.tmdb.org/t/p/w200/lmZFxXgJE3vgrciwuDib0N8CfQo.jpg" alt="Harry Potter e il Prigioniero di Azkaban">
      <img src="https://image.tmdb.org/t/p/w200/Av9yTlyQ3tD6G7G6iKGvks6hW7S.jpg" alt="Harry Potter e il Calice di Fuoco">
    </div>
  </div>
</div>

</body>
</html>
