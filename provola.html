<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Card Info Demo</title>
<style>
body {
    font-family: Arial, sans-serif;
    background: #141414;
    color: #fff;
    margin: 0;
    padding: 20px;
}
#infoCard {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) translateY(-30px);
    width: 90%;
    max-width: 800px;
    background: linear-gradient(to bottom, rgba(0,0,0,0.8), rgba(0,0,0,0.9)), url('https://image.tmdb.org/t/p/w300/qJ2tW6WMUDux911r6m7haRef0WH.jpg') center/cover no-repeat;
    border-radius: 10px;
    padding: 20px;
    display: flex;
    gap: 20px;
    opacity: 0;
    transition: opacity 0.3s ease, transform 0.3s ease;
    box-shadow: 0 10px 20px rgba(0,0,0,0.6);
}
#infoCard.show {
    opacity: 1;
    transform: translate(-50%, -50%) translateY(0);
}
#infoPoster {
    width: 200px;
    border-radius: 10px;
    flex-shrink: 0;
}
#infoContent {
    flex: 1;
}
#infoTitle {
    font-size: 28px;
    font-weight: bold;
    color: #e50914;
    text-shadow: 1px 1px 4px rgba(0,0,0,0.7);
    margin: 0 0 10px 0;
}
#infoOverview {
    line-height: 1.6;
    color: #ccc;
    margin: 10px 0;
}
#infoGenres, #infoVote, #infoYear, #infoDuration, #infoCast {
    margin: 4px 0;
    font-size: 14px;
    color: #ddd;
}
#playBtn {
    background: #e50914;
    color: #fff;
    border: none;
    border-radius: 5px;
    padding: 8px 12px;
    cursor: pointer;
    transition: background 0.3s ease;
    margin-right: 10px;
}
#playBtn:hover { background: #ff1a2b; }
.favorite-btn {
    font-size: 22px;
    color: gold;
    cursor: pointer;
    text-shadow: 0 0 4px #000;
}
.badge {
    display: inline-block;
    background: #e50914;
    color: #fff;
    border-radius: 50%;
    padding: 6px 10px;
    font-weight: bold;
    font-size: 14px;
    margin-left: 5px;
}
</style>
</head>
<body>

<button onclick="showCard()">Apri Card Info</button>

<div id="infoCard">
    <img id="infoPoster" src="" alt="Poster">
    <div id="infoContent">
        <h2 id="infoTitle"></h2>
        <div>
            <span id="infoVote" class="badge"></span>
            <span id="favoriteInCard" class="favorite-btn">★</span>
        </div>
        <p id="infoGenres"></p>
        <p id="infoOverview"></p>
        <p id="infoYear"></p>
        <p id="infoDuration"></p>
        <p id="infoCast"></p>
        <div style="margin-top:10px;">
            <button id="playBtn">Riproduci</button>
        </div>
    </div>
</div>

<script>
const infoCard = document.getElementById('infoCard');
const infoPoster = document.getElementById('infoPoster');
const infoTitle = document.getElementById('infoTitle');
const infoGenres = document.getElementById('infoGenres');
const infoVote = document.getElementById('infoVote');
const infoOverview = document.getElementById('infoOverview');
const infoYear = document.getElementById('infoYear');
const infoDuration = document.getElementById('infoDuration');
const infoCast = document.getElementById('infoCast');
const favoriteInCard = document.getElementById('favoriteInCard');
const playBtn = document.getElementById('playBtn');

const exampleMovie = {
    title: "Inception",
    poster: "https://image.tmdb.org/t/p/w300/qJ2tW6WMUDux911r6m7haRef0WH.jpg",
    genres: ["Azione", "Fantascienza", "Thriller"],
    vote: 8.8,
    overview: "Dom Cobb è un ladro esperto nell'arte dell'estrazione: rubare segreti preziosi dal profondo del subconscio durante il sogno.",
    year: 2010,
    duration: 148,
    cast: ["Leonardo DiCaprio", "Joseph Gordon-Levitt", "Elliot Page"]
};

function showCard() {
    infoPoster.src = exampleMovie.poster;
    infoTitle.textContent = exampleMovie.title;
    infoGenres.textContent = "Generi: " + exampleMovie.genres.join(", ");
    infoVote.textContent = exampleMovie.vote;
    infoOverview.textContent = exampleMovie.overview;
    infoYear.textContent = "Anno: " + exampleMovie.year;
    infoDuration.textContent = "Durata: " + exampleMovie.duration + " min";
    infoCast.textContent = "Cast: " + exampleMovie.cast.join(", ");
    infoCard.classList.add('show');
}

infoCard.onclick = (e) => {
    if(e.target === infoCard) {
        infoCard.classList.remove('show');
    }
};

playBtn.onclick = () => {
    alert("Qui partirebbe il player!");
};

favoriteInCard.onclick = () => {
    favoriteInCard.classList.toggle('active');
};
</script>

</body>
</html>
