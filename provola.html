<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Card Info Fullscreen Demo</title>
<style>
body {
    font-family: Arial, sans-serif;
    background: #141414;
    color: #fff;
    margin: 0;
    padding: 20px;
}
h1 {
    text-align: center;
    margin-bottom: 20px;
}
.grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 12px;
}
.card {
    cursor: pointer;
    border-radius: 10px;
    overflow: hidden;
    transition: transform 0.2s;
    border: 2px solid #444;
}
.card:hover { transform: scale(1.05); border-color: #e50914; }
.card img { width: 100%; display: block; }
#infoOverlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(20,20,20,0.95);
    display: none;
    justify-content: center;
    align-items: center;
    z-index: 1000;
    overflow-y: auto;
}
#infoCard {
    background: #1c1c1c;
    max-width: 900px;
    width: 95%;
    border-radius: 10px;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 15px;
    position: relative;
    animation: fadeIn 0.3s ease;
}
#infoCard img {
    width: 100%;
    max-height: 400px;
    object-fit: cover;
    border-radius: 10px;
}
#infoCard h2 { color: #e50914; margin: 0; }
#infoCard p { margin: 4px 0; color: #ccc; }
#infoCard .badge { background: #e50914; padding: 4px 8px; border-radius: 6px; font-weight: bold; display: inline-block; margin-right: 8px; }
#infoButtons { display: flex; gap: 10px; flex-wrap: wrap; }
button {
    padding: 8px 12px;
    border-radius: 5px;
    border: none;
    cursor: pointer;
    font-weight: bold;
}
#playBtn { background: #e50914; color: #fff; }
#favBtn { background: gold; color: #000; }
#closeBtn { background: #555; color: #fff; margin-left: auto; }
iframe { width: 100%; height: 400px; border: none; border-radius: 10px; }
@keyframes fadeIn { from {opacity:0; transform: translateY(-20px);} to {opacity:1; transform: translateY(0);} }
</style>
</head>
<body>

<h1>Griglia Film Demo</h1>
<div class="grid" id="moviesGrid">
    <!-- Locandine di prova -->
</div>

<div id="infoOverlay">
    <div id="infoCard">
        <button id="closeBtn">Chiudi</button>
        <img id="infoPoster" src="" alt="Poster">
        <h2 id="infoTitle"></h2>
        <div>
            <span id="infoVote" class="badge"></span>
            <span id="infoGenres"></span>
        </div>
        <p id="infoOverview"></p>
        <p id="infoYear"></p>
        <p id="infoDuration"></p>
        <p id="infoCast"></p>
        <div id="infoButtons">
            <button id="playBtn">Riproduci</button>
            <button id="favBtn">Aggiungi ai preferiti</button>
        </div>
        <h3>Trailer</h3>
        <iframe id="trailer" src="" allowfullscreen></iframe>
    </div>
</div>

<script>
// Dati demo
const movies = [
    {
        title: "Inception",
        poster: "https://image.tmdb.org/t/p/w300/qJ2tW6WMUDux911r6m7haRef0WH.jpg",
        genres: ["Azione", "Fantascienza", "Thriller"],
        vote: 8.8,
        overview: "Dom Cobb è un ladro esperto nell'arte dell'estrazione...",
        year: 2010,
        duration: 148,
        cast: ["Leonardo DiCaprio", "Joseph Gordon-Levitt", "Elliot Page"],
        trailer: "https://www.youtube.com/embed/YoHD9XEInc0"
    },
    {
        title: "Interstellar",
        poster: "https://image.tmdb.org/t/p/w300/rAiYTfKGqDCRIIqo664sY9XZIvQ.jpg",
        genres: ["Avventura", "Drammatico", "Fantascienza"],
        vote: 8.6,
        overview: "Un gruppo di esploratori utilizza un wormhole...",
        year: 2014,
        duration: 169,
        cast: ["Matthew McConaughey", "Anne Hathaway", "Jessica Chastain"],
        trailer: "https://www.youtube.com/embed/zSWdZVtXT7E"
    },
    {
        title: "The Dark Knight",
        poster: "https://image.tmdb.org/t/p/w300/qJ2tW6WMUDux911r6m7haRef0WH.jpg",
        genres: ["Azione", "Crime", "Drammatico"],
        vote: 9.0,
        overview: "Batman affronta il Joker, un criminale psicopatico...",
        year: 2008,
        duration: 152,
        cast: ["Christian Bale", "Heath Ledger", "Aaron Eckhart"],
        trailer: "https://www.youtube.com/embed/EXeTwQWrcwY"
    },
    {
        title: "Avatar",
        poster: "https://image.tmdb.org/t/p/w300/kmcqlZGaSh20zpTbuoF0Cdn07dT.jpg",
        genres: ["Azione", "Avventura", "Fantascienza"],
        vote: 7.8,
        overview: "Jake Sully, un ex-marine paraplegico, viene mandato su Pandora...",
        year: 2009,
        duration: 162,
        cast: ["Sam Worthington", "Zoe Saldana", "Sigourney Weaver"],
        trailer: "https://www.youtube.com/embed/5PSNL1qE6VY"
    }
];

const grid = document.getElementById('moviesGrid');
const overlay = document.getElementById('infoOverlay');
const infoPoster = document.getElementById('infoPoster');
const infoTitle = document.getElementById('infoTitle');
const infoGenres = document.getElementById('infoGenres');
const infoVote = document.getElementById('infoVote');
const infoOverview = document.getElementById('infoOverview');
const infoYear = document.getElementById('infoYear');
const infoDuration = document.getElementById('infoDuration');
const infoCast = document.getElementById('infoCast');
const playBtn = document.getElementById('playBtn');
const favBtn = document.getElementById('favBtn');
const closeBtn = document.getElementById('closeBtn');
const trailer = document.getElementById('trailer');

function renderGrid() {
    movies.forEach((m, idx) => {
        const div = document.createElement('div');
        div.className = 'card';
        div.innerHTML = `<img src="${m.poster}" alt="${m.title}">`;
        div.onclick = () => showInfo(m);
        grid.appendChild(div);
    });
}

function showInfo(movie) {
    infoPoster.src = movie.poster;
    infoTitle.textContent = movie.title;
    infoGenres.textContent = "Generi: " + movie.genres.join(", ");
    infoVote.textContent = movie.vote;
    infoOverview.textContent = movie.overview;
    infoYear.textContent = "Anno: " + movie.year;
    infoDuration.textContent = "Durata: " + movie.duration + " min";
    infoCast.textContent = "Cast: " + movie.cast.join(", ");
    trailer.src = movie.trailer + "?autoplay=1";
    overlay.style.display = 'flex';
    grid.style.display = 'none';
}

closeBtn.onclick = () => {
    overlay.style.display = 'none';
    trailer.src = '';
    grid.style.display = 'grid';
};

playBtn.onclick = () => alert("Qui partirebbe il player principale!");
favBtn.onclick = () => alert("Film aggiunto ai preferiti!");

renderGrid();
</script>

</body>
</html>
