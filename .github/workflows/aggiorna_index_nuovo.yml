name: Aggiorna index.html (nuovo.py - TEST)

on:
  workflow_dispatch:   # SOLO manuale, nessun cron

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests

      - name: Esegui nuovo.py
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
        run: |
          python nuovo.py

      - name: Commit risultati (TEST)
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add index2.html entries.json
          git commit -m "TEST: output da nuovo.py" || echo "Nessuna modifica"

      - name: Push risultati
        uses: ad-m/github-push-action@master
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
