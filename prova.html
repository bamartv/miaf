<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prova tendine stile</title>
<style>
body {
    background: #141414;
    color: #fff;
    font-family: Arial, sans-serif;
    padding: 40px;
    text-align: center;
}

/* Wrapper per la freccia custom */
.select-wrapper {
    position: relative;
    display: inline-block;
    margin: 10px;
}

/* Stile select */
select {
    padding: 10px 35px 10px 15px;
    border-radius: 25px;
    border: 2px solid #e50914;
    background: #1f1f1f;
    color: #fff;
    font-size: 16px;
    outline: none;
    cursor: pointer;
    appearance: none;
    -webkit-appearance: none;
    -moz-appearance: none;
    transition: all 0.3s ease;
    width: 200px;
}

/* Focus e hover */
select:focus {
    border-color: #ff3333;
    box-shadow: 0 0 8px #e50914;
}

select:hover {
    transform: scale(1.03);
}

/* Freccia custom */
.select-wrapper::after {
    content: '▼';
    position: absolute;
    right: 15px;
    top: 50%;
    transform: translateY(-50%);
    pointer-events: none;
    font-size: 14px;
    color: #fff;
}

/* Tendina multipla (generi) */
#genreSelect[multiple] {
    height: auto;
    max-height: 150px;
    overflow-y: auto;
    padding-right: 10px;
}

/* Scrollbar personalizzata per Webkit */
#genreSelect[multiple]::-webkit-scrollbar {
    width: 6px;
}
#genreSelect[multiple]::-webkit-scrollbar-thumb {
    background-color: #e50914;
    border-radius: 3px;
}
</style>
</head>
<body>

<h1>Prova Tendine Personalizzate</h1>

<div class="select-wrapper">
  <select id="typeSelect">
    <option value="movie">Film</option>
    <option value="tv">Serie TV</option>
    <option value="favorites">★ Preferiti</option>
    <option value="recent">👁 Visti di recente</option>
  </select>
</div>

<div class="select-wrapper">
  <select id="genreSelect" multiple size="5">
    <option>Avventura</option>
    <option>Commedia</option>
    <option>Azione</option>
    <option>Fantascienza</option>
    <option>Horror</option>
    <option>Documentario</option>
  </select>
</div>

</body>
</html>
