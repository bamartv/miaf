<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Preview Buttons Cinematic</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#111;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    color:white;
}

.mock-card{
    width:390px;
    height:780px;
    border-radius:20px;
    overflow:hidden;
    position:relative;
    background:
      linear-gradient(to bottom, rgba(0,0,0,.15), rgba(0,0,0,.65)),
      url('https://image.tmdb.org/t/p/w780/9PKD8I9YJQ4Y6lD4hJ6BqS6N7mP.jpg');
    background-size:cover;
    background-position:center;
    padding:30px 20px;
    box-sizing:border-box;
    text-align:center;
}

h1{
    margin-top:40px;
    font-size:28px;
    font-weight:800;
    text-shadow:0 3px 10px rgba(0,0,0,.8);
}

.button-row{
    display:flex;
    gap:14px;
    justify-content:center;
    margin-top:30px;
    flex-wrap:wrap;
}

/* ===== GUARDA ===== */
.btn-play{
    min-width:140px;
    height:48px;
    border:none;
    border-radius:10px;
    background:linear-gradient(180deg,#ffffff,#dcdcdc);
    color:#111;
    font-size:17px;
    font-weight:700;
    cursor:pointer;
    box-shadow:
      0 6px 18px rgba(0,0,0,.45),
      inset 0 1px 0 rgba(255,255,255,.9);
    transition:.25s;
}

.btn-play:hover{
    transform:scale(1.06);
    box-shadow:
      0 10px 24px rgba(0,0,0,.6),
      0 0 15px rgba(255,255,255,.25);
}

/* ===== CHIUDI ===== */
.btn-close{
    min-width:140px;
    height:48px;
    border:none;
    border-radius:10px;
    background:rgba(20,20,20,.78);
    backdrop-filter:blur(10px);
    color:#fff;
    font-size:17px;
    font-weight:700;
    cursor:pointer;
    border:1px solid rgba(255,255,255,.15);
    box-shadow:0 6px 18px rgba(0,0,0,.35);
    transition:.25s;
}

.btn-close:hover{
    transform:scale(1.06);
    background:rgba(35,35,35,.9);
}

/* ===== PREFERITI ===== */
.btn-fav{
    margin-top:14px;
    min-width:180px;
    height:46px;
    border:none;
    border-radius:999px;
    background:linear-gradient(135deg,#2c2c2c,#111);
    color:#ffd54f;
    font-size:16px;
    font-weight:700;
    cursor:pointer;
    border:1px solid rgba(255,213,79,.35);
    box-shadow:
      0 0 12px rgba(255,213,79,.15),
      0 4px 14px rgba(0,0,0,.4);
    transition:.25s;
}

.btn-fav:hover{
    transform:scale(1.06);
    box-shadow:
      0 0 18px rgba(255,213,79,.35),
      0 6px 18px rgba(0,0,0,.55);
}

.info{
    margin-top:30px;
    line-height:1.5;
    text-shadow:0 2px 6px rgba(0,0,0,.8);
}
</style>
</head>
<body>

<div class="mock-card">
    <h1>Non abbiamo bisogno di parole</h1>

    <div class="button-row">
        <button class="btn-play">▶ Guarda</button>
        <button class="btn-close">Chiudi</button>
    </div>

    <button class="btn-fav">★ Preferiti</button>

    <div class="info">
        Generi: Musica, Dramma, Commedia<br><br>
        ⭐ 6.7 / 10<br><br>
        Eletta è l'unica udente di una famiglia sorda...
    </div>
</div>

</body>
</html>
