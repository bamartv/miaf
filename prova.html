<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Movies & Series Grid</title>
<style>
body {
  margin: 0;
  background: #0a0a0a;
  font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  color: #fff;
}

header {
  padding: 20px;
  text-align: center;
  position: sticky;
  top: 0;
  background: rgba(0,0,0,0.8);
  backdrop-filter: blur(8px);
  z-index: 100;
}

header h1 {
  font-size: 2.5em;
  margin: 0;
  background: linear-gradient(90deg, #ff00ff, #00fff7, #ff9900);
  background-size: 300% 300%;
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  animation: gradientShift 6s ease infinite;
  letter-spacing: 1px;
}

header p {
  margin: 5px 0 15px;
  font-size: 1.2em;
  color: #aaa;
  font-style: italic;
}

.search-box {
  display: flex;
  justify-content: center;
  margin-top: 10px;
}

.search-box input {
  width: 60%;
  max-width: 400px;
  padding: 12px 20px;
  border: none;
  border-radius: 30px;
  font-size: 1em;
  outline: none;
  background: #1a1a1a;
  color: #fff;
  box-shadow: inset 0 0 8px rgba(255,255,255,0.1), 0 0 12px rgba(0,255,255,0.2);
  transition: box-shadow 0.3s;
}

.search-box input:focus {
  box-shadow: inset 0 0 8px rgba(255,255,255,0.15), 0 0 20px rgba(0,255,255,0.8);
}

/* Griglia film */
.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: 20px;
  padding: 20px;
}

.card {
  position: relative;
  overflow: hidden;
  border-radius: 12px;
  cursor: pointer;
  transition: transform 0.3s, box-shadow 0.3s;
}

.card img {
  width: 100%;
  height: 100%;
  display: block;
  border-radius: 12px;
}

.card::after {
  content: attr(data-title);
  position: absolute;
  bottom: 0;
  left: 0;
  width: 100%;
  padding: 10px;
  font-size: 0.9em;
  background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
  color: #fff;
}

.card:hover {
  transform: scale(1.05);
  box-shadow: 0 0 25px rgba(0,255,255,0.6);
}

/* Animazioni */
@keyframes gradientShift {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}
</style>
</head>
<body>

<header>
  <h1>🎬 Movies & Series</h1>
  <p>Aggiunti di recente</p>
  <div class="search-box">
    <input type="text" placeholder="🔍 Cerca un film o una serie...">
  </div>
</header>

<div class="grid">
  <div class="card" data-title="Inception">
    <img src="https://image.tmdb.org/t/p/w500/qmDpIHrmpJINaRKAfWQfftjCdyi.jpg" alt="Inception">
  </div>
  <div class="card" data-title="The Dark Knight">
    <img src="https://image.tmdb.org/t/p/w500/qJ2tW6WMUDux911r6m7haRef0WH.jpg" alt="The Dark Knight">
  </div>
  <div class="card" data-title="Interstellar">
    <img src="https://image.tmdb.org/t/p/w500/rAiYTfKGqDCRIIqo664sY9XZIvQ.jpg" alt="Interstellar">
  </div>
  <div class="card" data-title="Avatar">
    <img src="https://image.tmdb.org/t/p/w500/jRXYjXNq0Cs2TcJjLkki24MLp7u.jpg" alt="Avatar">
  </div>
  <div class="card" data-title="Pulp Fiction">
    <img src="https://image.tmdb.org/t/p/w500/d5iIlFn5s0ImszYzBPb8JPIfbXD.jpg" alt="Pulp Fiction">
  </div>
  <div class="card" data-title="Fight Club">
    <img src="https://image.tmdb.org/t/p/w500/bptfVGEQuv6vDTIMVCHjJ9Dz8PX.jpg" alt="Fight Club">
  </div>
  <div class="card" data-title="The Matrix">
    <img src="https://image.tmdb.org/t/p/w500/f89U3ADr1oiB1s9GkdPOEpXUk5H.jpg" alt="The Matrix">
  </div>
  <div class="card" data-title="Gladiator">
    <img src="https://image.tmdb.org/t/p/w500/ty8TGRuvJLPUmAR1H1nRIsgwvim.jpg" alt="Gladiator">
  </div>
  <div class="card" data-title="Titanic">
    <img src="https://image.tmdb.org/t/p/w500/9xjZS2rlVxm8SFx8kPC3aIGCOYQ.jpg" alt="Titanic">
  </div>
  <div class="card" data-title="The Godfather">
    <img src="https://image.tmdb.org/t/p/w500/3bhkrj58Vtu7enYsRolD1fZdja1.jpg" alt="The Godfather">
  </div>
</div>

</body>
</html>
