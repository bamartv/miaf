<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Streaming</title>

<style>

body{
background:#141414;
color:white;
font-family:Arial;
margin:0;
padding:20px;
}

#search{
width:100%;
padding:15px;
font-size:18px;
border:none;
border-radius:10px;
margin-bottom:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(140px,1fr));
gap:15px;
}

.card img{
width:100%;
border-radius:10px;
}

</style>
</head>

<body>

<input id="search" placeholder="Cerca film o serie...">

<div class="grid" id="grid"></div>

<script>

let allData=[];

fetch("data.json")
.then(r=>r.json())
.then(data=>{
    allData=data;
    render(data.slice(0,30)); // primi 30 titoli
});

function render(list){

const grid=document.getElementById("grid");
grid.innerHTML="";

list.forEach(item=>{

grid.innerHTML+=`
<div class="card">
<img loading="lazy" src="${item.poster}">
</div>
`;

});

}

document.getElementById("search").addEventListener("input",function(){

let q=this.value.toLowerCase();

if(q.length<2){
render(allData.slice(0,30));
return;
}

let results=allData.filter(m=>m.title.toLowerCase().includes(q)).slice(0,50);

render(results);

});

</script>

</body>
</html>
