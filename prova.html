<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Preview Pulsanti Full Width</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#111;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    color:white;
}

.mock-card{
    width:390px;
    height:780px;
    border-radius:20px;
    overflow:hidden;
    position:relative;
    background:
      linear-gradient(to bottom, rgba(0,0,0,.15), rgba(0,0,0,.65)),
      url('https://image.tmdb.org/t/p/w780/9PKD8I9YJQ4Y6lD4hJ6BqS6N7mP.jpg');
    background-size:cover;
    background-position:center;
    padding:30px 20px;
    box-sizing:border-box;
    text-align:center;
}

h1{
    margin-top:40px;
    font-size:28px;
    font-weight:800;
    text-shadow:0 3px 10px rgba(0,0,0,.8);
}

/* CONTENITORE PULSANTI */
.buttons{
    margin-top:28px;
    display:flex;
    flex-direction:column;
    gap:12px;
}

/* STILE BASE UNIFICATO */
.cine-btn{
    width:100%;
    height:52px;
    border:none;
    border-radius:12px;
    font-size:17px;
    font-weight:700;
    cursor:pointer;
    transition:.25s;
    box-shadow:0 6px 18px rgba(0,0,0,.4);
}

/* GUARDA */
.btn-play{
    background:linear-gradient(180deg,#ffffff,#dcdcdc);
    color:#111;
}

.btn-play:hover{
    transform:scale(1.03);
    box-shadow:
      0 10px 24px rgba(0,0,0,.6),
      0 0 15px rgba(255,255,255,.2);
}

/* CHIUDI */
.btn-close{
    background:rgba(20,20,20,.78);
    color:#fff;
    border:1px solid rgba(255,255,255,.15);
    backdrop-filter:blur(10px);
}

.btn-close:hover{
    transform:scale(1.03);
    background:rgba(35,35,35,.9);
}

/* PREFERITI */
.btn-fav{
    background:linear-gradient(135deg,#2c2c2c,#111);
    color:#ffd54f;
    border:1px solid rgba(255,213,79,.35);
    box-shadow:
      0 0 12px rgba(255,213,79,.12),
      0 4px 14px rgba(0,0,0,.4);
}

.btn-fav:hover{
    transform:scale(1.03);
    box-shadow:
      0 0 18px rgba(255,213,79,.28),
      0 6px 18px rgba(0,0,0,.55);
}

.info{
    margin-top:28px;
    line-height:1.5;
    text-shadow:0 2px 6px rgba(0,0,0,.8);
}
</style>
</head>
<body>

<div class="mock-card">
    <h1>Non abbiamo bisogno di parole</h1>

    <div class="buttons">
        <button class="cine-btn btn-play">▶ Guarda</button>
        <button class="cine-btn btn-close">Chiudi</button>
        <button class="cine-btn btn-fav">★ Preferiti</button>
    </div>

    <div class="info">
        Generi: Musica, Dramma, Commedia<br><br>
        ⭐ 6.7 / 10<br><br>
        Eletta è l'unica udente di una famiglia sorda...
    </div>
</div>

</body>
</html>
